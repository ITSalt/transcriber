name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Matches packageManager field in root package.json
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: transcrib
          POSTGRES_PASSWORD: transcrib
          POSTGRES_DB: transcrib_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U transcrib"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://transcrib:transcrib@localhost:5432/transcrib_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client must be generated before any package that imports
      # @prisma/client can typecheck or run tests (api + worker both need it).
      - name: Generate Prisma client
        run: pnpm --filter @transcrib/api run db:generate

      # Migrate the postgres service so prisma.smoke.test.ts (which only
      # gates on DATABASE_URL presence) has the schema it expects.
      - name: Apply Prisma migrations
        run: pnpm --filter @transcrib/api run db:migrate:deploy

      # shared/ is referenced as a TS project by api/worker/web — its
      # .d.ts output must exist before downstream typecheck.
      - name: Build shared (TS project references)
        run: pnpm --filter @transcrib/shared run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck (workspace, topological)
        run: pnpm -r run typecheck

      - name: Test (workspace, topological)
        run: pnpm -r run test
