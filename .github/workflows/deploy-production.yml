# .github/workflows/deploy-production.yml
name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    name: CI Checks
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        env:
          SSH_KEY: /home/runner/.ssh/deploy_key
          SSH_USER: ${{ secrets.PRODUCTION_USER }}
          SSH_HOST: ${{ secrets.PRODUCTION_HOST }}
        run: |
          ssh -i $SSH_KEY ${SSH_USER}@${SSH_HOST} << 'DEPLOY'
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20

            cd /opt/transcrib
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            # Install + generate Prisma client + build (workspace-wide)
            pnpm install --frozen-lockfile
            pnpm --filter @transcrib/api run db:generate
            pnpm --filter @transcrib/shared run build
            pnpm --filter @transcrib/api run build
            pnpm --filter @transcrib/worker run build
            pnpm --filter @transcrib/web run build

            # DB migrate
            pnpm --filter @transcrib/api run db:migrate:deploy

            # Sync static frontend to Caddy's serving directory
            rsync -a --delete web/dist/ /var/www/transcrib/frontend/dist/

            # pm2 reload (zero-downtime). Start if first deploy.
            cd /opt/transcrib
            pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
            pm2 save
          DEPLOY

      - name: Health check
        env:
          PROD_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${PROD_URL}/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "Production healthy."
              exit 0
            fi
            echo "Attempt $i/30: HTTP $code — retrying in 5s..."
            sleep 5
          done
          echo "::error::Production health check failed after 30 attempts."
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed for commit ${{ github.sha }}. To roll back:"
          echo "  ssh deploy@${{ secrets.PRODUCTION_HOST }}"
          echo "  cd /opt/transcrib && git reset --hard <previous-sha> && pnpm install --frozen-lockfile && pnpm --filter @transcrib/shared run build && pnpm --filter @transcrib/api run build && pnpm --filter @transcrib/worker run build && pm2 reload ecosystem.config.cjs"
