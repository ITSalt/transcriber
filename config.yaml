project:
  id: "transcrib"
  name: "Transcrib"
  description: "Transcription of large video files with speaker diarization and automated meeting report generation"
  stack: ""  # TBD — to be decided at nacl-tl-plan (OQ-4: ASR vendor, LLM provider, storage, PDF renderer)

# Declared in W0 of GAP-closure 2026-05-22 (see .tl/plans/2026-05-22-gap-closure-wave-plan.yaml).
# Per nacl-tl-core/references/config-schema.md:7-21. Switching to "prototype" is irreversible without a signed exception.
project_kind: "standard"

modules:
  mod-common:
    name: "Common"
    description: "Cross-cutting concerns: Meeting entity lifecycle, status tracking, meeting status display (UC-009), speaker name resolution UI (UC-003)"
    uc_range: "001-099"
    status: "finalized"
  mod-ingest:
    name: "Ingestion"
    description: "File upload, client-side validation, chunked transfer, object storage write, job queue dispatch (UC-001), failure handling (UC-005)"
    uc_range: "100-199"
    status: "finalized"
  mod-transcription:
    name: "Transcription"
    description: "ASR worker pipeline: audio extraction, diarization, speaker attribution, transcript persistence (UC-002), status updates"
    uc_range: "200-299"
    status: "finalized"
  mod-protocol:
    name: "Protocol"
    description: "LLM protocol generation (UC-004), Markdown editor and versioning (UC-007), PDF export (UC-008), transcript view/download (UC-006)"
    uc_range: "300-399"
    status: "finalized"

git:
  strategy: "feature-branch"  # "direct" | "feature-branch"
  main_branch: "main"
  branch_prefix: "feature/"

# Filled in W8 of GAP-closure 2026-05-22; previously {} / "" while production was already live.
vps:
  host: "82.202.156.157"
  user: "deploy"
  base_dir: "/opt/transcrib"

ci_platform: "github-actions"

build:
  package_manager: "pnpm"
  requires_prisma_generate: true
  entrypoint: "api/dist/index.js"   # pm2 entry per ecosystem.config.cjs; NOT api/dist/server.js (postmortem class C2)
  test_database_url: "postgresql://transcrib:transcrib@localhost:5432/transcrib_test"
  migrate_cmd: "pnpm --filter @transcrib/api run db:migrate:deploy"

deploy:
  method: "github-actions-ssh"   # .github/workflows/deploy-production.yml
  urls:
    prod: "https://transcriber.itsalt.ru"
  health_endpoint: "/api/health"
  smoke:
    endpoints:
      - "/api/health"              # HEALTH_ONLY per W4 distinction
      - "/api/meetings"            # exercises UC-001 catalog list — real product surface

# In-repo runtime assets (paths relative to project root after install + build).
# System binaries (ffmpeg, ffprobe, chromium) come from TECH-017 server bootstrap
# and are out of config.yaml.runtime_assets scope per config-schema.md.
runtime_assets:
  - "worker/dist/llm/prompts/ru/protocol.md"   # copied by worker build script (66049d5)
  - "worker/dist/llm/prompts/en/protocol.md"
  - "api/dist/lib/pdf/template.html"           # copied by api build script (UC-302 render)
  - "api/dist/index.js"                        # pm2 transcrib-api entry
  - "worker/dist/index.js"                     # pm2 transcrib-worker entry

graph:
  # Port corrected in W1-reconciliation 2026-05-22 (GAP-034): config previously
  # declared 3587 while the running transcrib-neo4j container + .mcp.json use 3627.
  neo4j_bolt_port: 3627
  neo4j_http_port: 3574
  neo4j_password: "neo4j_graph_dev"
  container_prefix: "transcrib"
  boards_dir: "graph-infra/boards"

docmost:
  api_url: ""
  spaces: {}

yougile: {}  # not configured

credentials: {}  # do not store secrets here — use .env files

reports:
  sa_finalization: "FR-SA-001"
  sa_validation: "VR-SA-003"
  ba_validation: "VAL-BA-001"
