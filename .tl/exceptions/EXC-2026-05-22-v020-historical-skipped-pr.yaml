exception_id: "EXC-2026-05-22-v020-historical-skipped-pr"

owner: "magznikitin"

reason: |
  Retroactive coverage for the v0.2.0 release (2026-05-18) that landed via
  direct-to-main commits without PRs and shipped to https://transcriber.itsalt.ru
  before the W11 strict-mode reform existed. project_kind=prototype was not
  declared at the time (declared post-hoc as 'standard' in W0 of GAP-closure
  2026-05-22 per OQ-1), so the v0.2.0 history would fail nacl-tl-release
  Condition 6 (skipped-pr-without-prototype-exception). This exception is
  frozen-in-history: expiry equals the release date itself, so the exception
  applies ONLY to the v0.2.0 historical record and provides no carve-out for
  any future release. Future releases must either use the feature-branch + PR
  workflow per config.yaml.git.strategy='feature-branch' OR declare
  project_kind=prototype and file a per-release exception.

created_at: "2026-05-22T13:25:00Z"

# Frozen-in-history exception: expiry equals the v0.2.0 release date.
# Any commit / release dated AFTER 2026-05-18T23:59:59Z is NOT covered.
expiry: "2026-05-18T23:59:59Z"

affected_gates:
  - "skipped-pr"

affected_projects:
  - "transcrib"

followup_task: "RFC-2026-05-22-future-release-protocol — define the canonical release flow under strict mode (feature/release-* branch + PR + CI green + signed-exception authoring rules; replace the direct-to-main pattern used pre-reform). Tracked in .tl/tasks/RFC-future-release-protocol/ (to be created in a follow-up wave)."
