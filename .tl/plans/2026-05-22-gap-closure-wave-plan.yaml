      - "W1-reconciliation VERIFIED"
    subagent_instructions: |
      Invoke /nacl-sa-uc in 'Phase 4.5 runtime-contract + property-backfill' mode. Steps:
      1) Property backfill — for each of the 9 UCs:
         - entrypoint_type: 'form-based' for actor=AUTHOR + has_ui=true (UC-001/002/003/100/201/301);
           'embed-only' for UC-302 (PDF render is action-triggered, no own form); 'n/a' for UC-200/300
           (actor=SYSTEM).
         - has_provider_dependency: true for UC-100/UC-200/UC-300/UC-302 (S3, Deepgram, kie.ai, Puppeteer);
           false otherwise.
         - is_release_gate_uc: true for UC-100/UC-200/UC-300/UC-302; false otherwise.
      2) Decision-tree (Q1..Q5) for each UC; mandatory verdict for UC-100/UC-200/UC-300; optional
         (mark not_required) for the rest. UC-302 → not_required (Puppeteer is sync-stream; no FSM).
      3) RuntimeContract authoring for UC-200:
         - HAS_TRANSITION edges over the TranscriptionJob.status FSM: PENDING → PROCESSING →
           {DONE | FAILED}; plus MeetingStatus side: UPLOADED → TRANSCRIBING → TRANSCRIBED|ERROR.
         - ACQUIRES_LOCK: BullMQ job lock per meetingId.
         - EMITS_EVENT: meeting.status, transcription.progress, transcription.complete (per
           shared/src/api/sse-events.ts).
         - Eight Phase 4.5.2 fields filled per worker/src/job-processor.ts.
      4) Same shape for UC-300 (ProtocolGenerationJob FSM + protocol.* SSE events).
      5) RuntimeContract for UC-100: upload-multipart FSM with parts[].uploaded counter, abort
         path, presigned-URL TTL guard. Smaller contract; may flag as PARTIALLY for the recover-
