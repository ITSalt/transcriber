
# ITSalt Transcrib — Cloud.ru / Moscow (added 2026-05-18 by TECH-020)
transcriber.itsalt.ru {
    encode gzip zstd

    log {
        output file /var/log/caddy/transcrib-access.log {
            roll_size 100mb
            roll_keep 14
        }
        format json
    }

    header {
        X-Content-Type-Options nosniff
        X-Frame-Options DENY
        Referrer-Policy strict-origin-when-cross-origin
    }

    # SSE — disable buffering so events flush immediately.
    @sse path_regexp sse ^/api/meetings/[^/]+/events$
    handle @sse {
        reverse_proxy 127.0.0.1:3010 {
            flush_interval -1
        }
    }

    # TUS uploads — large bodies, no buffering.
    handle /api/uploads/* {
        reverse_proxy 127.0.0.1:3010
        request_body {
            max_size 0
        }
    }

    # Catch-all API.
    handle /api/* {
        reverse_proxy 127.0.0.1:3010
    }

    # Static SPA.
    handle {
        root * /var/www/transcrib/frontend/dist
        try_files {path} /index.html
        file_server

        @static path /assets/*
        header @static Cache-Control "public, max-age=31536000, immutable"

        @html path *.html /
        header @html Cache-Control "no-cache, no-store, must-revalidate"
    }
}
